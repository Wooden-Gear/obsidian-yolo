name: Auto Triage

# Codex replacement for the old Claude routine:
# - schedule / workflow_dispatch: scan recent activity
# - owner mention: handle only the mentioned issue or PR

on:
  schedule:
    - cron: '0 17 * * *'
  workflow_dispatch:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  triage:
    if: >
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.sender.login == 'Lapis0x0' &&
        (
          contains(github.event.comment.body, '@lapis0x0-bot') ||
          contains(github.event.review.body, '@lapis0x0-bot')
        )
      )
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.YOLO_BOT_GH_TOKEN }}

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore Codex auth
        env:
          YOLO_CODEX_AUTH_JSON: ${{ secrets.YOLO_CODEX_AUTH_JSON }}
          YOLO_CODEX_CONFIG_TOML: ${{ secrets.YOLO_CODEX_CONFIG_TOML }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.codex"
          printf '%s' "$YOLO_CODEX_AUTH_JSON" > "$HOME/.codex/auth.json"
          printf '%s' "$YOLO_CODEX_CONFIG_TOML" > "$HOME/.codex/config.toml"
          chmod 600 "$HOME/.codex/auth.json" "$HOME/.codex/config.toml"

      - name: Install Codex and gh
        run: |
          set -euo pipefail
          npm install -g @openai/codex@0.130.0
          if ! command -v gh >/dev/null 2>&1; then
            type -p curl >/dev/null || sudo apt-get update -qq
            type -p curl >/dev/null || sudo apt-get install -y curl
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg |
              sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
            sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" |
              sudo tee /etc/apt/sources.list.d/github-cli.list >/dev/null
            sudo apt-get update -qq
            sudo apt-get install -y gh
          fi
          codex --version
          gh --version | head -1

      - name: Configure GitHub identity
        env:
          GH_TOKEN: ${{ secrets.YOLO_BOT_GH_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "lapis0x0-bot"
          git config user.email "lapis0x0-bot@users.noreply.github.com"
          gh auth setup-git
          gh auth status

      - name: Build prompt
        env:
          EVENT_NAME: ${{ github.event_name }}
          REPO: ${{ github.repository }}
          NUMBER: ${{ github.event.issue.number || github.event.pull_request.number || '' }}
          AUTHOR: ${{ github.event.sender.login || '' }}
          BODY: ${{ github.event.comment.body || github.event.review.body || '' }}
          URL: ${{ github.event.comment.html_url || github.event.review.html_url || '' }}
        run: |
          set -euo pipefail
          cp .github/prompts/obsidian-yolo-auto-triage.md /tmp/auto-triage-prompt.md
          if [[ "$EVENT_NAME" != "schedule" && "$EVENT_NAME" != "workflow_dispatch" ]]; then
            {
              printf '\n\n<routine-fire-payload>\n'
              jq -n \
                --arg repo "$REPO" \
                --arg number "$NUMBER" \
                --arg author "$AUTHOR" \
                --arg body "$BODY" \
                --arg url "$URL" \
                '{
                  repo: $repo,
                  number: $number,
                  url: $url,
                  author: $author,
                  body: $body
                }'
              printf '\n</routine-fire-payload>\n'
            } >> /tmp/auto-triage-prompt.md
          fi

      - name: Run Codex triage
        env:
          GH_TOKEN: ${{ secrets.YOLO_BOT_GH_TOKEN }}
        run: |
          set -euo pipefail
          codex exec \
            --model gpt-5.5 \
            --sandbox danger-full-access \
            --ask-for-approval never \
            --cd "$GITHUB_WORKSPACE" \
            - < /tmp/auto-triage-prompt.md
